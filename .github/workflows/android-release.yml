name: Seller Android Package (No Play Upload)

on:
  workflow_dispatch:
  push:
    tags:
      - "seller-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.5"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Configure Android signing when available
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [[ -z "$KEYSTORE_BASE64" ]]; then
            echo "::warning::No upload keystore is configured; the package will use the debug signing fallback and must not be uploaded to Google Play."
            exit 0
          fi
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"
          test -n "$STORE_PASSWORD"
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          printf 'storeFile=upload-keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" \
            > android/key.properties

      - name: Build signed app bundle
        env:
          MERCHANT_API_BASE_URL: ${{ vars.MERCHANT_API_BASE_URL }}
          MERCHANT_CLIENT_ID: ${{ vars.MERCHANT_CLIENT_ID }}
          MERCHANT_HMAC_SECRET_KEY: ${{ secrets.MERCHANT_HMAC_SECRET_KEY }}
        run: >-
          flutter build appbundle --release
          --build-number=${{ github.run_number }}
          --dart-define=MERCHANT_API_BASE_URL="$MERCHANT_API_BASE_URL"
          --dart-define=MERCHANT_CLIENT_ID="$MERCHANT_CLIENT_ID"
          --dart-define=MERCHANT_HMAC_SECRET_KEY="$MERCHANT_HMAC_SECRET_KEY"

      - name: Build signed APK for direct testing
        env:
          MERCHANT_API_BASE_URL: ${{ vars.MERCHANT_API_BASE_URL }}
          MERCHANT_CLIENT_ID: ${{ vars.MERCHANT_CLIENT_ID }}
          MERCHANT_HMAC_SECRET_KEY: ${{ secrets.MERCHANT_HMAC_SECRET_KEY }}
        run: >-
          flutter build apk --release
          --build-number=${{ github.run_number }}
          --dart-define=MERCHANT_API_BASE_URL="$MERCHANT_API_BASE_URL"
          --dart-define=MERCHANT_CLIENT_ID="$MERCHANT_CLIENT_ID"
          --dart-define=MERCHANT_HMAC_SECRET_KEY="$MERCHANT_HMAC_SECRET_KEY"

      - name: Verify app bundle signature
        run: jarsigner -verify build/app/outputs/bundle/release/app-release.aab

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: seller-android-${{ github.run_number }}
          path: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              build/app/outputs/bundle/release/app-release.aab \
              build/app/outputs/flutter-apk/app-release.apk \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              build/app/outputs/bundle/release/app-release.aab \
              build/app/outputs/flutter-apk/app-release.apk \
              --generate-notes \
              --title "$GITHUB_REF_NAME"
          fi

      # Google Play upload is intentionally disabled until the Play Console
      # account, application, service account, and production testing are ready.
