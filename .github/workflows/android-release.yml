name: Android Release

on:
  push:
    tags:
      - "seller-v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.5"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Configure Android signing
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64"
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          printf 'storeFile=upload-keystore.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" \
            > android/key.properties

      - name: Build signed app bundle
        env:
          MERCHANT_API_BASE_URL: ${{ vars.MERCHANT_API_BASE_URL }}
          MERCHANT_CLIENT_ID: ${{ vars.MERCHANT_CLIENT_ID }}
          MERCHANT_HMAC_SECRET_KEY: ${{ secrets.MERCHANT_HMAC_SECRET_KEY }}
        run: >-
          flutter build appbundle --release
          --build-number=${{ github.run_number }}
          --dart-define=MERCHANT_API_BASE_URL="$MERCHANT_API_BASE_URL"
          --dart-define=MERCHANT_CLIENT_ID="$MERCHANT_CLIENT_ID"
          --dart-define=MERCHANT_HMAC_SECRET_KEY="$MERCHANT_HMAC_SECRET_KEY"

      - name: Build signed APK for direct testing
        env:
          MERCHANT_API_BASE_URL: ${{ vars.MERCHANT_API_BASE_URL }}
          MERCHANT_CLIENT_ID: ${{ vars.MERCHANT_CLIENT_ID }}
          MERCHANT_HMAC_SECRET_KEY: ${{ secrets.MERCHANT_HMAC_SECRET_KEY }}
        run: >-
          flutter build apk --release
          --build-number=${{ github.run_number }}
          --dart-define=MERCHANT_API_BASE_URL="$MERCHANT_API_BASE_URL"
          --dart-define=MERCHANT_CLIENT_ID="$MERCHANT_CLIENT_ID"
          --dart-define=MERCHANT_HMAC_SECRET_KEY="$MERCHANT_HMAC_SECRET_KEY"

      - name: Verify app bundle signature
        run: jarsigner -verify build/app/outputs/bundle/release/app-release.aab

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seller-android-${{ github.run_number }}
          path: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload to Google Play internal testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.techlong.speedfeast.merchant
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          releaseName: ${{ github.ref_name }}
